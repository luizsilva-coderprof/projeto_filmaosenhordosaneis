<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="titulo_principal">
        <h1>O senhor dos anéis</h1>
        <h2>Uma das trilogias mais famosas do cinema</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="sinopse.html">Sinopse</a>
            <a href="imagemfilme.html">Imagem do filme</a>
            <a href="personagens.html">Personagens principais</a>
            <a href="informacoes.html">Informações</a>
            <a href="ordem.html">Ordem dos filmes</a>
            <a href="curiosidades.html">Curiosidades</a>
            <a href="impacto.html">Impacto Cultural</a>
            <a href="contato.html">Contato</a>
        </nav>
    </div>
    <h2 class="titulo_secundario">Entre em contato:</h2>
    <form action="processa.php" method="POST" autocomplete="off">
        <label for="nomepessoa">Nome:</label>
        <input type="text" disabled name="nomepessoa" id="nomepessoa" minlength="3" maxlength="15" required placeholder="Informe seu nome"><br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required placeholder="E-mail"><br><br>

        <label for="ano">Ano de nascimento:</label>
        <input type="number" id="ano" name="ano" max="2026" min="1900" placeholder="Informe ano de nascimento"><br><br>

        <label for="telefone">Telefone</label>
        <input type="tel" name="telefone" id="telefone" placeholder="Informe seu telefone"><br><br>

        <label for="github">Infome seu github:</label>
        <input type="url" name="github" id="github" placeholder="Informe seu github"><br><br>

        <label for="senha">Infome sua senha:</label>
        <input type="password" id="senha" name="senha"><br><br>

        <label for="arquivo">Anexe um arquivo:</label>
        <input type="file" id="arquivo" name="arquivo"><br><br>

        <label for="cor">Escolha uma cor:</label>
        <input type="color" id="cor" name="cor"><br><br>

        <fieldset>
            <legend>Campos de tempo</legend>
            <label for="data">Informe a data</label>
            <input type="date" name="data" id="data"><br><br>

            <label for="mes">Informe o mes</label>
            <input type="month" name="mes" id="mes"><br><br>

            <label for="semana">Informe a semana</label>
            <input type="week" name="semana" id="semana"><br><br>

            <label for="hora">Informe a hora:</label>
            <input type="time" name="hora" id="hora"><br><br>

            <label for="datahora">Data e hora atual</label>
            <input type="datetime-local" name="datahora" id="datahora"><br><br>
        </fieldset>

        <label for="pesquisa">Pesquisa</label>
        <input type="search" id="pesquisa" name="pesquisa"><br><br>

        <label for="descricao">Infome aqui o que voce gosta nos filmes:</label><br>
        <textarea cols="30" rows="10" name="descricao" id="descricao"></textarea><br><br>

        <fieldset>
            <legend>Qual seu filme favorito?</legend>
            <label for="filme1"><input type="radio" name="filme" id="filme1" value="Filme 1">Filme 1</label>

            <label for="filme2"><input checked type="radio" name="filme" id="filme2" value="Filme 2">Filme 2</label>
            
            <label for="filme3"><input type="radio" name="filme" id="filme3" value="Filme 3">Filme 3</label>
        </fieldset>

        <select>
            <option value="filme 1">Filme 1</option>
            <option value="filme 2">Filme 2</option>
            <option selected value="filme 3">Filme 3</option>
        </select>

        <button type="reset">Limpar</button>
        <button type="submit">Enviar</button>

    </form>
</body>
</html>
